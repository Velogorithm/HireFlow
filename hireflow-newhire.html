   PRIMITIVES
========================= */
const Badge = ({ tone='gray', children }) => {
  const tones = {
    gray: 'bg-gray-100 text-gray-700',
    violet: 'bg-violet-100 text-violet-800',
    teal: 'bg-teal-100 text-teal-800',
    amber: 'bg-amber-100 text-amber-900',
    red: 'bg-red-100 text-red-800',
    yellow: 'bg-yellow-100 text-yellow-900',
    green: 'bg-green-100 text-green-800',
    blue: 'bg-blue-100 text-blue-900',
  };
  return <span className={`inline-block text-xs font-medium px-2 py-0.5 rounded-full ${tones[tone]}`}>{children}</span>;
};

const StatusBadge = ({ status }) => {
  const map = {
    'not-started': { tone: 'gray', label: 'Not started' },
    'in-progress': { tone: 'blue', label: 'In progress' },
    'in-review':   { tone: 'amber', label: 'In review' },
    'completed':   { tone: 'green', label: 'Completed' },
  };
  const cfg = map[status] || map['not-started'];
  return <Badge tone={cfg.tone}>{cfg.label}</Badge>;
};

const Card = ({ title, action, children, className='' }) => (
  <div className={`bg-white rounded-xl shadow-sm border border-gray-200 ${className}`}>
    {(title || action) && (
      <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
        {title && <h3 className="font-semibold text-gray-800">{title}</h3>}
        {action}
      </div>
    )}
    <div className="p-5">{children}</div>
  </div>
);

const StatCard = ({ label, value, tone='violet' }) => {
  const tones = {
    violet: 'from-violet-50 to-white text-violet-800',
    green: 'from-green-50 to-white text-green-800',
    amber: 'from-amber-50 to-white text-amber-900',
    blue: 'from-blue-50 to-white text-blue-800',
    gray: 'from-gray-50 to-white text-gray-700',
  };
  return (
    <div className={`rounded-xl border border-gray-200 bg-gradient-to-br ${tones[tone]} p-4`}>
      <div className="text-xs text-gray-500 uppercase tracking-wider">{label}</div>
      <div className="text-2xl font-bold mt-1">{value}</div>
    </div>
  );
};

const Modal = ({ open, onClose, title, children, footer, wide=false }) => {
  if (!open) return null;
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-end sm:items-center justify-center p-2 sm:p-4" onClick={onClose}>
      <div className={`bg-white rounded-xl shadow-xl w-full ${wide ? 'max-w-2xl' : 'max-w-lg'} max-h-[90vh] overflow-auto`} onClick={e => e.stopPropagation()}>
        <div className="px-5 py-3 border-b flex items-center justify-between">
          <h3 className="font-semibold">{title}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-700 text-xl leading-none">&times;</button>
        </div>
        <div className="p-5">{children}</div>
        {footer && <div className="px-5 py-3 border-t bg-gray-50 rounded-b-xl flex gap-2 justify-end">{footer}</div>}
      </div>
    </div>
  );
};

const Field = ({ label, children }) => (
  <label className="block">
    <span className="text-sm text-gray-600">{label}</span>
    <div className="mt-1">{children}</div>
  </label>
);

const computeProgress = (hire) => {
  if (!hire) return 0;
  const total = SECTIONS.length;
  const done = SECTIONS.filter(s => hire.sections[s.id]?.complete).length;
  return Math.round((done / total) * 100);
};

const computeStatus = (hire) => {
  const allComplete = SECTIONS.every(s => hire.sections[s.id]?.complete);
  const anyComplete = SECTIONS.some(s => hire.sections[s.id]?.complete);
  const allReviewed = SECTIONS.every(s => hire.reviews[s.id]?.approved);
  if (hire.pushedToShiftFlow) return 'completed';
  if (allComplete && allReviewed) return 'completed';
  if (allComplete) return 'in-review';
  if (anyComplete) return 'in-progress';
  return 'not-started';
};

/* =========================
   LOGIN
========================= */
const Login = ({ onLogin, users }) => {
  const [username, setUsername] = useState('hr');
  const [password, setPassword] = useState('hr');
  const [err, setErr] = useState('');
  const submit = (e) => {
    e.preventDefault();
    const u = users.find(x => x.username === username.trim() && x.password === password);
    if (!u) { setErr('Invalid credentials'); return; }
    onLogin(u);
  };
  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-violet-50 via-white to-teal-50">
      <div className="w-full max-w-md">
        <div className="text-center mb-6">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-violet-700 text-white text-2xl font-bold mb-3 shadow">HC</div>
          <h1 className="text-2xl font-bold text-gray-800">HireFlow</h1>
          <p className="text-gray-500 text-sm">Onboarding for care institutions</p>
          <p className="text-gray-400 text-[10px] mt-1">by Velogorithm</p>
        </div>
        <form onSubmit={submit} className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
          <div>
            <label className="text-sm text-gray-600">Username</label>
            <input value={username} onChange={e => setUsername(e.target.value)}
              className="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-violet-500" />
          </div>
          <div>
            <label className="text-sm text-gray-600">Password</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
              className="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-violet-500" />
          </div>
          {err && <div className="text-sm text-red-600">{err}</div>}
          <button className="w-full btn-primary font-medium rounded-lg py-2.5">Sign in</button>
          <div className="text-xs text-gray-500 leading-relaxed pt-2 border-t">
            <p className="font-semibold text-gray-700 mb-1">Demo accounts</p>
            <p>HR: <span className="font-mono">hr / hr</span> · Manager: <span className="font-mono">manager / manager</span></p>
            <p>New hires: <span className="font-mono">sarah / sarah</span> (just started), <span className="font-mono">david / david</span> (in progress), <span className="font-mono">maria / maria</span> (in review)</p>
          </div>
        </form>
      </div>
    </div>
  );
};

/* =========================
   HR — PIPELINE DASHBOARD
========================= */
const HRDashboard = ({ state, setState, onOpen, onAdd }) => {
  const counts = {
    notStarted: state.hires.filter(h => computeStatus(h) === 'not-started').length,
    inProgress: state.hires.filter(h => computeStatus(h) === 'in-progress').length,
    inReview:   state.hires.filter(h => computeStatus(h) === 'in-review').length,
    completed:  state.hires.filter(h => computeStatus(h) === 'completed').length,
  };
  const upcomingStarts = state.hires
    .filter(h => h.startDate >= todayISO())
    .sort((a, b) => a.startDate.localeCompare(b.startDate))
    .slice(0, 5);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <StatCard label="Not started" value={counts.notStarted} tone="gray" />
        <StatCard label="In progress" value={counts.inProgress} tone="blue" />
        <StatCard label="In review" value={counts.inReview} tone="amber" />
        <StatCard label="Completed" value={counts.completed} tone="green" />
      </div>

      <Card title="All hires" action={
        <button onClick={onAdd} className="btn-primary rounded-lg px-3 py-1.5 text-sm font-medium">+ Add new hire</button>
      }>
        {state.hires.length === 0 ? (
          <p className="text-sm text-gray-500">No hires yet. Click "Add new hire" to start onboarding someone.</p>
        ) : (
          <div className="overflow-x-auto -mx-5">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 text-gray-700">
                <tr>
                  <th className="text-left px-4 py-2">Name</th>
                  <th className="text-left px-4 py-2">Position</th>
                  <th className="text-left px-4 py-2">Location</th>

const SectionDocuments = ({ data, onChange }) => {
  const STORAGE_MODES = {
    starter: {
      label: 'Starter — Email to HR',
      short: 'File emailed to hr@customer.com. Not stored by Velogorithm.',
      icon: '✉',
      badgeCls: 'bg-blue-100 text-blue-800',
    },
    standard: {
      label: 'Standard — Cloudflare R2',
      short: 'File stored in Cloudflare R2, WNAM region. AES-256 at rest. 7-year retention.',
      icon: '☁',
      badgeCls: 'bg-teal-100 text-teal-800',
    },
    enterprise: {
      label: 'Enterprise — Customer bucket',
      short: 'File uploaded to customer AWS S3 / Azure Blob / SharePoint. Velogorithm keeps only metadata.',
      icon: '⚿',
      badgeCls: 'bg-violet-100 text-violet-800',
    },
  };

  const [mode, setMode] = React.useState(() => {
    try { return localStorage.getItem('hireflow_storage_mode') || 'standard'; }
    catch(e) { return 'standard'; }
  });
  const changeMode = (m) => {
    setMode(m);
    try { localStorage.setItem('hireflow_storage_mode', m); } catch(e) {}
  };
  const current = STORAGE_MODES[mode];

  const docs = [
    { id: 'sin_doc', label: 'SIN documentation', accept: 'image/*,.pdf' },
    { id: 'license', label: 'Driver\'s license or government ID', accept: 'image/*,.pdf' },
    { id: 'certs', label: 'Professional certifications (CPR, First Aid, etc.)', accept: 'image/*,.pdf' },
    { id: 'photo_id', label: 'Recent photo for ID badge', accept: 'image/*' },
  ];

  const MAX_MB = 5;
  const [error, setError] = React.useState('');

  const formatSize = (b) => {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(2) + ' MB';
  };

  const handleFile = (docId, file) => {
    setError('');
    if (!file) return;
    if (file.size > MAX_MB * 1048576) {
      setError('File larger than ' + MAX_MB + ' MB — demo storage limit. In production, HireFlow Standard supports up to 100 MB per file.');
      return;
    }
    const meta = {
      filename: file.name,
      size: file.size,
      type: file.type || 'application/octet-stream',
      uploadedAt: new Date().toISOString(),
    };
    // For image files under 1 MB, capture a preview
    if (file.type && file.type.startsWith('image/') && file.size < 1048576) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        onChange({...data, [docId]: {...meta, preview: ev.target.result}});
      };
      reader.readAsDataURL(file);
    } else {
      onChange({...data, [docId]: meta});
    }
  };

  const removeDoc = (docId) => {
    const next = {...data};
    delete next[docId];
    onChange(next);
  };

  // Trigger click on a hidden file input by id
  const triggerPicker = (docId) => {
    const el = document.getElementById('hf_file_' + docId);
    if (el) el.click();
  };

  // Backwards-compat: previous format stored `true` for uploaded. Normalise on read.
  const getMeta = (docId) => {
    const v = data[docId];
    if (!v) return null;
    if (v === true) return { filename: '(uploaded)', size: 0, type: '', uploadedAt: null };
    return v;
  };

  return (
    <div>
      {/* Info box */}
      <div className="mb-3 p-3 bg-amber-50 border border-amber-200 rounded-lg">
        <div className="text-xs font-bold text-amber-900 mb-1 tracking-wide uppercase">Where do these files actually go?</div>
        <p className="text-xs text-gray-800 leading-relaxed">
          In production, the storage destination depends on your tier: <strong>Starter</strong> emails files directly to your HR inbox (Velogorithm never stores them). <strong>Standard</strong> stores encrypted in Cloudflare R2 within your isolated tenant, retrievable via the HireFlow web UI with a full audit trail. <strong>Enterprise</strong> pushes to your own cloud storage (AWS S3, Azure Blob, or SharePoint), with Velogorithm keeping only metadata. Use the toggle below to see what each mode looks like.
        </p>
      </div>

      {/* Storage mode toggle */}
      <div className="mb-3 p-3 bg-gray-50 border border-gray-200 rounded-lg">
        <div className="text-xs font-bold text-gray-700 mb-2 tracking-wide uppercase">Demo control &middot; Storage mode</div>
        <div className="flex flex-wrap gap-1.5 mb-2">
          {Object.keys(STORAGE_MODES).map(k => (
            <button key={k} onClick={() => changeMode(k)} type="button"
              className={`text-xs px-3 py-1.5 rounded-full font-medium border ${mode === k ? 'bg-violet-700 text-white border-violet-700' : 'bg-white text-gray-700 border-gray-300 hover:border-violet-300'}`}>
              {STORAGE_MODES[k].label}
            </button>
          ))}
        </div>
        <div className={`text-xs px-2 py-1 rounded ${current.badgeCls} inline-block`}>
          {current.icon} {current.short}
        </div>
      </div>

      <p className="text-sm text-gray-600 mb-3">Upload each required document. Click <strong>Upload</strong> to open your file browser and pick a real file. In this demo, the file is not sent to a server &mdash; but the filename, size, and (for images) a preview are stored locally so you can see the workflow.</p>

      {error && (
        <div className="mb-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-800">
          {error}
        </div>
      )}

      <ul className="space-y-2">
        {docs.map(d => {
          const meta = getMeta(d.id);
          return (
            <li key={d.id} className="p-3 border border-gray-200 rounded-lg">
              <div className="flex items-start justify-between gap-3">
                <div className="flex items-start gap-3 flex-1 min-w-0">
                  <span className={`w-8 h-8 rounded-full grid place-items-center flex-shrink-0 mt-0.5 ${meta ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'}`}>
                    {meta ? '✓' : '○'}
                  </span>
                  <div className="min-w-0 flex-1">
                    <div className="text-sm font-medium">{d.label}</div>
                    {meta && (
                      <div className="mt-1">
                        <div className="text-xs text-gray-700 truncate">
                          <span className="font-mono">{meta.filename}</span>
                          {meta.size ? <span className="text-gray-500"> &middot; {formatSize(meta.size)}</span> : null}
                          {meta.type ? <span className="text-gray-500"> &middot; {meta.type}</span> : null}
                        </div>
                        <div className="text-xs text-gray-500 mt-0.5">
                          {current.icon} {current.short}
                        </div>
                        {meta.preview && (
                          <img src={meta.preview} alt="preview" className="mt-2 rounded border border-gray-200 max-h-24 max-w-full" />
                        )}
                      </div>
                    )}
                  </div>
                </div>
                <div className="flex-shrink-0">
                  <input
                    id={'hf_file_' + d.id}
                    type="file"
                    accept={d.accept}
                    style={{ display: 'none' }}
                    onChange={(e) => handleFile(d.id, e.target.files && e.target.files[0])}
                  />
                  {meta ? (
                    <div className="flex gap-1">
                      <button onClick={() => triggerPicker(d.id)} className="text-xs px-2 py-1.5 rounded bg-white border border-gray-300 text-gray-700 hover:bg-gray-50">Replace</button>
                      <button onClick={() => removeDoc(d.id)} className="text-xs px-2 py-1.5 rounded bg-gray-100 text-gray-700 hover:bg-gray-200">Remove</button>
                    </div>
                  ) : (
                    <button onClick={() => triggerPicker(d.id)} className="text-xs px-3 py-1.5 rounded-lg btn-primary">
                      Upload
                    </button>
                  )}
                </div>
              </div>
            </li>
          );
        })}
      </ul>

      <p className="text-xs text-gray-500 italic mt-3">Demo storage limit: {MAX_MB} MB per file. In production, HireFlow Standard supports up to 100 MB per file; Enterprise negotiable per contract.</p>
    </div>
  );
};

const isSectionComplete = (id, data) => {
  if (!data) return false;
  switch (id) {
    case 'personal':  return !!(data.address && data.dob && data.sin && data.citizenship);
    case 'banking':   return !!(data.bank && data.transit && data.account && data.td1Federal && data.td1Provincial);
    case 'emergency': return !!(data.name && data.relationship && data.phone);
    case 'documents': return Object.values(data).every(Boolean);
    case 'policies':  return POLICIES.every(p => data[p.id]);
    case 'training':  return TRAINING.filter(t => t.required).every(t => data[t.id]);
    case 'equipment': return Object.values(data).every(Boolean);
    case 'orientation': return Object.values(data).filter(Boolean).length >= 4;
    default: return false;
  }
};

/* =========================
   NEW HIRE — ONBOARDING WIZARD
========================= */
const HireOnboarding = ({ state, setState, hire, currentUser }) => {
  const [activeSection, setActiveSection] = useState(SECTIONS[0].id);

  const updateSection = (sectionId, newData) => {
    const complete = isSectionComplete(sectionId, newData);
    setState(prev => {
      const hires = prev.hires.map(h => {
        if (h.id !== hire.id) return h;
        const updated = { ...h, sections: { ...h.sections, [sectionId]: { complete, data: newData } } };
        updated.status = computeStatus(updated);
        return updated;
      });
      const auditLog = [...prev.auditLog, { ts: new Date().toISOString(), by: currentUser.username, action: `Updated ${sectionId} for ${hire.fullName}` + (complete ? ' (section complete)' : '') }];
      return { ...prev, hires, auditLog };
    });
  };

  const submit = () => {
    const allComplete = SECTIONS.every(s => isSectionComplete(s.id, hire.sections[s.id]?.data || {}));
    if (!allComplete) { alert('Please complete all sections before submitting.'); return; }
    setState(prev => {
      const hires = prev.hires.map(h => h.id === hire.id ? { ...h, status: 'in-review', submittedAt: new Date().toISOString() } : h);
      const auditLog = [...prev.auditLog, { ts: new Date().toISOString(), by: currentUser.username, action: `Submitted onboarding for review: ${hire.fullName}` }];
      return { ...prev, hires, auditLog };
    });
  };

  const resetDemoSubmission = () => {
    setState(prev => {
      const hires = prev.hires.map(h => h.id === hire.id ? { ...h, status: 'in-progress', submittedAt: null } : h);
      return { ...prev, hires };
    });
    setActiveSection(SECTIONS[0].id);
  };

  // If already submitted, show thank-you view instead of the wizard
  if (hire.status === 'in-review') {
    const submittedDate = hire.submittedAt ? new Date(hire.submittedAt) : new Date();
    return (
      <div className="space-y-5">
        <div className="rounded-2xl bg-gradient-to-r from-green-700 to-teal-600 text-white p-6 shadow">
          <div className="flex items-start gap-4">
            <div className="w-14 h-14 rounded-full bg-white/20 grid place-items-center text-3xl flex-shrink-0">
              ✓
            </div>
            <div className="flex-1">
              <div className="text-sm opacity-90">Submitted for HR review</div>
              <div className="text-2xl font-bold mt-1">Thanks, {hire.fullName.split(' ')[0]}!</div>
              <div className="text-sm mt-2 text-green-50">
                Your onboarding submission has been sent to HR. You'll be notified as each section is approved. Nothing more is required from you right now.
              </div>
              <div className="text-xs mt-3 text-green-100">
                Submitted {submittedDate.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })}
              </div>
            </div>
          </div>
        </div>

        <Card title="What happens next">
          <ol className="space-y-3 text-sm text-gray-700">
            <li className="flex gap-3">
              <span className="w-6 h-6 rounded-full bg-violet-100 text-violet-700 grid place-items-center text-xs font-bold flex-shrink-0">1</span>
              <div>
                <div className="font-medium">HR reviews each section</div>
                <div className="text-xs text-gray-500 mt-0.5">Typical turnaround: 1–2 business days per section. You'll receive email updates as each section is approved or if changes are requested.</div>
              </div>
            </li>
            <li className="flex gap-3">
              <span className="w-6 h-6 rounded-full bg-violet-100 text-violet-700 grid place-items-center text-xs font-bold flex-shrink-0">2</span>
              <div>
                <div className="font-medium">Training scheduled</div>
                <div className="text-xs text-gray-500 mt-0.5">Once policies and documents are approved, HR will schedule your required training (CPR, First Aid, PIPEDA) before your first shift.</div>
              </div>
            </li>
            <li className="flex gap-3">
              <span className="w-6 h-6 rounded-full bg-violet-100 text-violet-700 grid place-items-center text-xs font-bold flex-shrink-0">3</span>
              <div>
                <div className="font-medium">Equipment collected on Day 1</div>
                <div className="text-xs text-gray-500 mt-0.5">Uniform, ID badge, and locker key will be ready when you arrive. Site tour with your supervisor is scheduled for your first day.</div>
              </div>
            </li>
            <li className="flex gap-3">
              <span className="w-6 h-6 rounded-full bg-violet-100 text-violet-700 grid place-items-center text-xs font-bold flex-shrink-0">4</span>
              <div>
                <div className="font-medium">Account provisioned</div>
                <div className="text-xs text-gray-500 mt-0.5">Once all sections are approved, your record is pushed to ShiftFlow (or your existing T&A system) so you can start clocking in from Day 1.</div>
              </div>
            </li>
          </ol>
        </Card>

        <Card title="Section status">
          <ul className="space-y-2 text-sm">
            {SECTIONS.map(s => (
              <li key={s.id} className="flex items-center justify-between py-1.5 border-b border-gray-100 last:border-0">
                <span className="flex items-center gap-2">
                  <span className="w-5 h-5 rounded-full bg-amber-100 text-amber-800 grid place-items-center text-[10px] font-bold">⧗</span>
                  {s.step} &middot; {s.label}
                </span>
                <span className="text-xs text-amber-800 bg-amber-50 px-2 py-0.5 rounded-full">In review</span>
              </li>
            ))}
          </ul>
        </Card>

        <div className="bg-gray-50 border border-gray-200 rounded-lg p-4 text-xs text-gray-600">
          <div className="font-semibold text-gray-800 mb-1">Demo control</div>
          <p>This is a working demo — you can reset your submission and walk through the flow again to show a colleague.</p>
          <button onClick={resetDemoSubmission} className="mt-2 text-xs px-3 py-1.5 rounded-lg bg-white border border-gray-300 hover:border-violet-400 hover:text-violet-700">
            ↻ Reset submission &amp; edit again
          </button>
        </div>
      </div>
    );
  }

  const progress = computeProgress(hire);
  const section = SECTIONS.find(s => s.id === activeSection);
  const sectionData = hire.sections[activeSection]?.data || SECTION_DEFAULTS[activeSection];

  return (
    <div className="space-y-5">
      <div className="rounded-2xl bg-gradient-to-r from-violet-700 to-violet-600 text-white p-5 shadow">
        <div className="text-sm opacity-90">Welcome,</div>
        <div className="text-2xl font-bold">{hire.fullName}</div>
        <div className="text-sm mt-1 text-violet-100">{hire.position} · Starts {fmtDate(hire.startDate)} · {hire.location}</div>
        <div className="mt-4">
          <div className="flex justify-between text-xs mb-1">
            <span>Onboarding progress</span><span>{progress}%</span>
          </div>
          <div className="bg-violet-900/30 h-2 rounded-full overflow-hidden">
            <div className="bg-white h-full transition-all" style={{width: progress + '%'}} />
          </div>
        </div>
      </div>

      {/* Stepper */}
      <div className="flex items-center gap-1 overflow-x-auto pb-2">
        {SECTIONS.map(s => {
          const sd = hire.sections[s.id]?.data || SECTION_DEFAULTS[s.id];
          const done = isSectionComplete(s.id, sd);
          const active = s.id === activeSection;
          return (
            <button key={s.id} onClick={() => setActiveSection(s.id)}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs whitespace-nowrap border ${
                active ? 'bg-violet-600 text-white border-violet-600' :
                done ? 'bg-violet-50 text-violet-700 border-violet-200' :
                'bg-white text-gray-500 border-gray-200'
              }`}>
              <span className={`w-5 h-5 rounded-full grid place-items-center text-[10px] font-bold ${
                active ? 'bg-white text-violet-700' : done ? 'bg-violet-600 text-white' : 'bg-gray-100 text-gray-500'
              }`}>{done ? '✓' : s.step}</span>
              {s.label}
            </button>
          );
        })}
      </div>

      <Card title={`${section.step} · ${section.label}`}>
        {activeSection === 'personal' && <SectionPersonal data={sectionData} onChange={d => updateSection('personal', d)} />}
        {activeSection === 'banking' && <SectionBanking data={sectionData} onChange={d => updateSection('banking', d)} />}
        {activeSection === 'emergency' && <SectionEmergency data={sectionData} onChange={d => updateSection('emergency', d)} />}
        {activeSection === 'documents' && <SectionDocuments data={sectionData} onChange={d => updateSection('documents', d)} />}
        {activeSection === 'policies' && <SectionPolicies data={sectionData} onChange={d => updateSection('policies', d)} />}
        {activeSection === 'training' && <SectionTraining data={sectionData} onChange={d => updateSection('training', d)} />}
        {activeSection === 'equipment' && <SectionEquipment data={sectionData} onChange={d => updateSection('equipment', d)} />}
        {activeSection === 'orientation' && <SectionOrientation data={sectionData} onChange={d => updateSection('orientation', d)} />}

        <div className="mt-5 pt-4 border-t flex justify-between">
          <button onClick={() => {
            const idx = SECTIONS.findIndex(s => s.id === activeSection);
            if (idx > 0) setActiveSection(SECTIONS[idx - 1].id);
          }} disabled={activeSection === SECTIONS[0].id}
            className={`px-4 py-2 text-sm rounded-lg border ${activeSection === SECTIONS[0].id ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-50'}`}>← Previous</button>
          {activeSection !== SECTIONS[SECTIONS.length - 1].id ? (
            <button onClick={() => {
              const idx = SECTIONS.findIndex(s => s.id === activeSection);
              setActiveSection(SECTIONS[idx + 1].id);
            }} className="px-4 py-2 text-sm rounded-lg btn-primary">Next →</button>
          ) : (
            <button onClick={submit} disabled={progress < 100}
              className={`px-4 py-2 text-sm rounded-lg ${progress < 100 ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'btn-primary'}`}>
              Submit for review
            </button>
          )}
        </div>
      </Card>
    </div>
  );
};

/* =========================
   HR — HIRE DETAIL & REVIEW
========================= */
const HireDetail = ({ state, setState, hireId, currentUser, onBack }) => {
  const hire = state.hires.find(h => h.id === hireId);
  if (!hire) return null;

  const approve = (sectionId) => {
    setState(prev => {
      const hires = prev.hires.map(h => {
        if (h.id !== hireId) return h;
        const reviews = { ...h.reviews, [sectionId]: { approved: true, by: currentUser.username, at: new Date().toISOString(), notes: '' } };
        const updated = { ...h, reviews };
        updated.status = computeStatus(updated);
        return updated;
      });
      const auditLog = [...prev.auditLog, { ts: new Date().toISOString(), by: currentUser.username, action: `Approved ${sectionId} for ${hire.fullName}` }];
      return { ...prev, hires, auditLog };
    });
  };

  const requestChanges = (sectionId) => {
    const notes = prompt(`Notes for ${hire.fullName} on the ${sectionId} section:`);
    if (notes === null) return;
    setState(prev => {
      const hires = prev.hires.map(h => {
        if (h.id !== hireId) return h;
        const sections = { ...h.sections, [sectionId]: { ...h.sections[sectionId], complete: false } };
        const reviews = { ...h.reviews, [sectionId]: { approved: false, by: currentUser.username, at: new Date().toISOString(), notes } };
        const updated = { ...h, sections, reviews };
        updated.status = computeStatus(updated);
        return updated;
      });
      const auditLog = [...prev.auditLog, { ts: new Date().toISOString(), by: currentUser.username, action: `Requested changes on ${sectionId} for ${hire.fullName}: "${notes}"` }];
      return { ...prev, hires, auditLog };
    });
  };

  const remove = () => {
    if (!confirm(`Remove ${hire.fullName} from onboarding pipeline? This deletes the hire record but not their audit log.`)) return;
    setState(prev => ({
      ...prev,
      hires: prev.hires.filter(h => h.id !== hireId),
      auditLog: [...prev.auditLog, { ts: new Date().toISOString(), by: currentUser.username, action: `Removed hire: ${hire.fullName}` }],
    }));
    onBack();
  };

  const pushToShiftFlow = () => {
    if (!SECTIONS.every(s => hire.sections[s.id]?.complete)) { alert('All sections must be complete before pushing to ShiftFlow.'); return; }
    if (!SECTIONS.every(s => hire.reviews[s.id]?.approved)) { alert('All sections must be approved by HR before pushing to ShiftFlow.'); return; }

    const shiftFlowRecord = {
      caregiver: {
        name: hire.fullName,
        username: hire.fullName.toLowerCase().split(' ')[0].replace(/[^a-z]/g, ''),
        email: hire.email,
        phone: hire.phone,
        team: hire.location,
        startDate: hire.startDate,
        position: hire.position,
        certs: TRAINING.filter(t => hire.sections.training?.data?.[t.id]).map(t => t.title),
      },
      sourceSystem: 'HireFlow',
      sourceHireId: hire.id,
      ts: new Date().toISOString(),
    };

    // Write to shared handoff queue (would be consumed by ShiftFlow)
    try {
      const queue = JSON.parse(localStorage.getItem(SHARED_HANDOFF_KEY) || '[]');
      queue.push(shiftFlowRecord);
      localStorage.setItem(SHARED_HANDOFF_KEY, JSON.stringify(queue));
    } catch(e) {}

    setState(prev => {
      const hires = prev.hires.map(h => h.id === hireId ? { ...h, pushedToShiftFlow: { at: new Date().toISOString(), recordId: shiftFlowRecord.sourceHireId } } : h);
      const auditLog = [...prev.auditLog, { ts: new Date().toISOString(), by: currentUser.username, action: `Pushed ${hire.fullName} to ShiftFlow staff directory` }];
      return { ...prev, hires, auditLog };
    });

    alert(`${hire.fullName} has been pushed to ShiftFlow!\n\nOpen the ShiftFlow demo (bea-fisher-attendance.html) in another tab. Within 5 seconds a toast notification will appear confirming the import, and ${hire.fullName.split(' ')[0]} will show up in the Employees tab.\n\nSign in as any supervisor to see the new record.\n\nUsername: ${hire.fullName.toLowerCase().split(' ')[0].replace(/[^a-z]/g, '')}\nPassword: same as username (must change on first login in production)`);
  };

  const progress = computeProgress(hire);
  const allApproved = SECTIONS.every(s => hire.reviews[s.id]?.approved);
  const readyToPush = progress === 100 && allApproved && !hire.pushedToShiftFlow;

  return (
    <div className="space-y-5">
      <button onClick={onBack} className="text-sm text-violet-700 hover:underline">← Back to pipeline</button>

      <Card>
        <div className="flex flex-wrap justify-between items-start gap-3">
          <div>
            <h2 className="text-xl font-bold text-gray-800">{hire.fullName}</h2>
            <div className="text-sm text-gray-600 mt-1">{hire.position} · Starts {fmtDate(hire.startDate)} · {hire.location}</div>
            <div className="text-xs text-gray-500 mt-1">{hire.email} {hire.phone && `· ${hire.phone}`}</div>
            <div className="mt-2 flex items-center gap-2"><StatusBadge status={computeStatus(hire)} /> <Badge tone="gray">{progress}% complete</Badge></div>
          </div>
          <div className="flex gap-2">
            {readyToPush && (
              <button onClick={pushToShiftFlow} className="px-3 py-1.5 text-sm rounded-lg bg-teal-700 hover:bg-teal-800 text-white font-medium">
                Push to ShiftFlow →
              </button>
            )}
            {hire.pushedToShiftFlow && (
              <a href="./bea-fisher-attendance.html" target="_blank" rel="noopener"
                 className="px-3 py-1.5 text-sm rounded-lg bg-white border border-teal-600 text-teal-700 hover:bg-teal-50 font-medium">
                View in ShiftFlow ↗
              </a>
            )}
            {hire.pushedToShiftFlow && (
              <span className="px-3 py-1.5 text-sm rounded-lg bg-green-100 text-green-800 font-medium">
                ✓ Pushed to ShiftFlow
              </span>
            )}
            <button onClick={remove} className="px-3 py-1.5 text-sm rounded-lg border text-red-600 hover:bg-red-50">Remove</button>
          </div>
        </div>
      </Card>

      <Card title="Onboarding sections">
        <div className="space-y-2">
          {SECTIONS.map(s => {
            const sec = hire.sections[s.id];
            const review = hire.reviews[s.id];
            return (
              <div key={s.id} className="border border-gray-200 rounded-lg p-3 flex flex-wrap items-center justify-between gap-2">
                <div className="flex items-center gap-3">
                  <span className={`w-9 h-9 rounded-full grid place-items-center text-sm font-mono ${sec?.complete ? 'bg-violet-100 text-violet-700' : 'bg-gray-100 text-gray-400'}`}>
                    {sec?.complete ? '✓' : s.step}
                  </span>
                  <div>
                    <div className="font-medium text-sm">{s.label}</div>
                    <div className="text-xs text-gray-500">
                      {sec?.complete ? 'Submitted' : 'Not yet submitted'}
                      {review?.approved && <> · <span className="text-green-700">Approved by {review.by}</span></>}
                      {review && !review.approved && <> · <span className="text-amber-700">Changes requested: {review.notes}</span></>}
                    </div>
                  </div>
                </div>
                {sec?.complete && (
                  <div className="flex gap-2">
                    {!review?.approved && (
                      <>
                        <button onClick={() => approve(s.id)} className="px-2.5 py-1 text-xs rounded-lg bg-green-100 text-green-800 hover:bg-green-200">Approve</button>
                        <button onClick={() => requestChanges(s.id)} className="px-2.5 py-1 text-xs rounded-lg bg-amber-100 text-amber-900 hover:bg-amber-200">Request changes</button>
                      </>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
};

/* =========================
   AUDIT LOG VIEW
========================= */
const AuditView = ({ state }) => (
  <Card title="Audit log">
    <ul className="space-y-2">
      {[...state.auditLog].reverse().map((a, i) => (
        <li key={i} className="text-sm border-l-2 border-violet-400 pl-3 py-1">
          <div className="text-xs text-gray-500">{new Date(a.ts).toLocaleString()} · <span className="font-medium">{a.by}</span></div>
          <div>{a.action}</div>
        </li>
      ))}
    </ul>
  </Card>
);

/* =========================
   SETTINGS
========================= */
const Settings = ({ state, setState }) => {
  const [orgEdit, setOrgEdit] = useState(state.companyName || 'Demo Care Services');
  const saveOrg = () => { setState(prev => ({ ...prev, companyName: orgEdit.trim() || 'Demo Care Services' })); alert('Saved.'); };
  const resetDemo = () => { if (!confirm('Restore the demo data? This replaces everything in HireFlow.')) return; setState(seedData()); alert('Restored.'); };
  const cleanSlate = () => { if (!confirm('Remove all hires and audit log? Login accounts are kept.')) return; setState(prev => ({ ...prev, hires: [], auditLog: [] })); alert('Cleaned.'); };
  const clearQueue = () => { if (!confirm('Clear the ShiftFlow handoff queue?')) return; try { localStorage.removeItem(SHARED_HANDOFF_KEY); alert('Cleared.'); } catch(e) {} };

  return (
    <div className="space-y-5">
      <Card title="Organization">
        <Field label="Company / institution name">
          <div className="flex gap-2">
            <input value={orgEdit} onChange={e => setOrgEdit(e.target.value)} className="flex-1 border rounded-lg px-3 py-2" />
            <button onClick={saveOrg} className="btn-primary rounded-lg px-4 py-2 text-sm font-medium">Save</button>
          </div>
        </Field>
      </Card>

      <Card title="ShiftFlow integration">
        <p className="text-sm text-gray-700">When you push a completed hire to ShiftFlow from the Hire detail view, HireFlow writes the caregiver record to a shared localStorage queue at:</p>
        <p className="font-mono text-xs bg-gray-100 px-3 py-1 rounded inline-block mt-2">{SHARED_HANDOFF_KEY}</p>
        <p className="text-sm text-gray-700 mt-3">In a production deployment, this would be an API call to ShiftFlow to provision the new caregiver. For the demo, ShiftFlow can read this key on load to import new caregivers.</p>
        <button onClick={clearQueue} className="mt-3 px-3 py-1.5 text-sm border rounded-lg">Clear handoff queue</button>
      </Card>

      <Card title="Reset">
        <div className="space-y-3">
          <div className="flex justify-between items-center border border-gray-200 rounded-lg p-3">
            <div><div className="font-medium text-sm">Restore demo data</div><div className="text-xs text-gray-500">Reload the original three sample hires.</div></div>
            <button onClick={resetDemo} className="btn-primary px-3 py-1.5 text-sm rounded-lg">Restore</button>
          </div>
          <div className="flex justify-between items-center border border-gray-200 rounded-lg p-3">
            <div><div className="font-medium text-sm">Clean slate</div><div className="text-xs text-gray-500">Remove all hires and audit log. Accounts kept.</div></div>
            <button onClick={cleanSlate} className="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 text-sm rounded-lg">Clear</button>
          </div>
        </div>
      </Card>
    </div>
  );
};

/* =========================
   APP SHELL
========================= */
const App = () => {
  const [state, setState] = useState(loadState);
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [openHireId, setOpenHireId] = useState(null);
  const [addingHire, setAddingHire] = useState(false);

  useEffect(() => { saveState(state); }, [state]);

  if (!user) return <Login users={state.users} onLogin={setUser} />;

  // New hire sees their own onboarding wizard
  if (user.role === 'hire') {
    const myHire = state.hires.find(h => h.userId === user.id);
    if (!myHire) {
      return (
        <div className="min-h-screen">
          <Header user={user} onLogout={() => setUser(null)} companyName={state.companyName} />
          <main className="max-w-3xl mx-auto p-4">
            <Card>
              <p className="text-sm text-gray-600">You don't have an onboarding record yet. Please contact your HR contact.</p>
            </Card>
          </main>
        </div>
      );
    }
    return (
      <div className="min-h-screen">
        <Header user={user} onLogout={() => setUser(null)} companyName={state.companyName} />
        <main className="max-w-3xl mx-auto p-4">
          <HireOnboarding state={state} setState={setState} hire={myHire} currentUser={user} />
        </main>
      </div>
    );
  }

  // HR / Manager
  const managers = state.users.filter(u => u.role === 'manager' || u.role === 'hr');
  const TABS = [
    { id: 'dashboard', label: 'Pipeline' },
    { id: 'audit', label: 'Audit log' },
    { id: 'settings', label: 'Settings' },
  ];

  const handleAddHire = (data) => {
    const id = 'h' + newId();
    const userId = 'u' + newId();
    setState(prev => {
      const username = data.fullName.toLowerCase().split(' ')[0].replace(/[^a-z]/g, '');
      const newUser = { id: userId, username, password: username, name: data.fullName, role: 'hire', email: data.email };
      const newHire = {
        id, userId,
        fullName: data.fullName, email: data.email, phone: data.phone,
        startDate: data.startDate, position: data.position, location: data.location, managerId: data.managerId,
        status: 'not-started',
        sections: emptySections(), reviews: emptyReviews(),
        pushedToShiftFlow: null,
        createdAt: new Date().toISOString(), createdBy: user.username,
      };
      return {
        ...prev,
        users: [...prev.users, newUser],
        hires: [...prev.hires, newHire],
        auditLog: [...prev.auditLog, { ts: new Date().toISOString(), by: user.username, action: `Created hire: ${data.fullName} (${data.position || 'unspecified position'})` }],
      };
    });
    setAddingHire(false);
  };

  return (
    <div className="min-h-screen">
      <Header user={user} onLogout={() => setUser(null)} companyName={state.companyName} />
      <nav className="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div className="max-w-6xl mx-auto px-4 flex gap-1 overflow-x-auto">
          {TABS.map(t => (
            <button key={t.id} onClick={() => { setTab(t.id); setOpenHireId(null); }}
              className={`px-3 py-3 text-sm font-medium whitespace-nowrap border-b-2 -mb-px ${tab === t.id ? 'tab-active' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>{t.label}</button>
          ))}
        </div>
      </nav>
      <main className="max-w-6xl mx-auto p-4 sm:p-6">
        {openHireId ? (
          <HireDetail state={state} setState={setState} hireId={openHireId} currentUser={user} onBack={() => setOpenHireId(null)} />
        ) : (
          <>
            {tab === 'dashboard' && <HRDashboard state={state} setState={setState} onOpen={setOpenHireId} onAdd={() => setAddingHire(true)} />}
            {tab === 'audit' && <AuditView state={state} />}
            {tab === 'settings' && <Settings state={state} setState={setState} />}
          </>
        )}
      </main>
      <AddHireModal open={addingHire} onClose={() => setAddingHire(false)} onSave={handleAddHire} managers={managers} />
    </div>
  );
};

const Header = ({ user, onLogout, companyName }) => (
  <header className="bg-white border-b border-gray-200">
    <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div className="flex items-center gap-3">
        <div className="w-9 h-9 rounded-lg bg-violet-700 text-white grid place-items-center font-bold text-sm">HC</div>
        <div>
          <div className="font-semibold text-gray-800 leading-tight">HireFlow</div>
          <div className="text-xs text-gray-500 leading-tight">{companyName || 'Demo Care Services'} · onboarding</div>
        </div>
      </div>
      <div className="flex items-center gap-3">
        <div className="text-right hidden sm:block">
          <div className="text-sm font-medium text-gray-800">{user.name}</div>
          <div className="text-xs text-gray-500 capitalize">{user.role === 'hr' ? 'HR Admin' : user.role === 'hire' ? 'New hire' : user.role}</div>
        </div>
        <button onClick={onLogout} className="text-sm text-gray-600 hover:text-gray-900 border rounded-lg px-3 py-1.5">Sign out</button>
      </div>
    </div>
  </header>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
